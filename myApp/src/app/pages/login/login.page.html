<ion-content class="login-content" scroll-y="false">
  <div class="auth-wrapper">

    <!-- Brand -->
    <div class="brand-section">
      <h1 class="brand-name">FreelanceHub</h1>
      <p class="brand-subtitle">Sign in to your account</p>
      <p class="brand-sub2">Enter your details to continue</p>
    </div>

    <!-- Form -->
    <div class="form-section">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

        <!-- Email -->
        <div class="field-group" [class.field-error]="email.invalid && email.touched">
          <div class="field-wrapper">
            <input
              type="email"
              class="field-input"
              placeholder="email@domain.com"
              formControlName="email"
              autocomplete="email"
            />
          </div>
          <span class="error-msg" *ngIf="email.hasError('required') && email.touched">Email is required</span>
          <span class="error-msg" *ngIf="email.hasError('email') && email.touched">Enter a valid email</span>
        </div>

        <!-- Password -->
        <div class="field-group" [class.field-error]="password.invalid && password.touched">
          <div class="field-wrapper">
            <input
              [type]="showPassword ? 'text' : 'password'"
              class="field-input"
              placeholder="Password"
              formControlName="password"
              autocomplete="current-password"
            />
            <button type="button" class="toggle-pw" (click)="togglePassword()">
              <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
            </button>
          </div>
          <span class="error-msg" *ngIf="password.hasError('required') && password.touched">Password is required</span>
          <span class="error-msg" *ngIf="password.hasError('minlength') && password.touched">Minimum 6 characters</span>
        </div>

        <div class="forgot-row">
          <a class="forgot-link" href="#">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="btn-primary"
          [class.btn-loading]="isLoading"
          [disabled]="isLoading"
        >
          <span *ngIf="!isLoading">Continue</span>
          <ion-spinner *ngIf="isLoading" name="crescent" class="btn-spinner"></ion-spinner>
        </button>

      </form>
    </div>

    <!-- Divider -->
    <div class="divider"><span>or</span></div>

    <!-- Social buttons -->
    <div class="social-row">
      <!-- Google -->
      <button class="social-btn" type="button" (click)="loginWithGoogle()" [disabled]="isGoogleLoading">
        <ion-spinner *ngIf="isGoogleLoading" name="crescent" style="width:18px;height:18px;--color:#555"></ion-spinner>
        <svg *ngIf="!isGoogleLoading" width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
      </button>
      <!-- Apple -->
      <button class="social-btn" type="button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#000">
          <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.4c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.39-1.32 2.76-2.53 3.99zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
        </svg>
      </button>
      <!-- Facebook -->
      <button class="social-btn" type="button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
      </button>
    </div>

    <!-- Terms -->
    <p class="terms-text">
      By clicking continue, you agree to our
      <a href="#" class="terms-link">Terms of Service</a>
      and <a href="#" class="terms-link">Privacy Policy</a>
    </p>

    <!-- Sign up link -->
    <p class="switch-text">
      Don't have an account?
      <span class="switch-link" (click)="goToRegister()">Sign up</span>
    </p>

  </div>
</ion-content>
