<ion-content class="login-content" scroll-y="false">
  <div class="auth-wrapper">

    <div class="brand-section">
      <h1 class="brand-name">FreelanceHub</h1>
      <p class="brand-subtitle">Sign in to your account</p>
      <p class="brand-sub2">Enter your details to continue</p>
    </div>

    <div class="form-section">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

        <div class="field-group" [class.field-error]="email.invalid && email.touched">
          <div class="field-wrapper">
            <input type="email" class="field-input" placeholder="email@domain.com"
              formControlName="email" autocomplete="email" />
          </div>
          <span class="error-msg" *ngIf="email.hasError('required') && email.touched">Email is required</span>
          <span class="error-msg" *ngIf="email.hasError('email') && email.touched">Enter a valid email</span>
        </div>

        <div class="field-group" [class.field-error]="password.invalid && password.touched">
          <div class="field-wrapper">
            <input [type]="showPassword ? 'text' : 'password'" class="field-input"
              placeholder="Password" formControlName="password" autocomplete="current-password" />
            <button type="button" class="toggle-pw" (click)="togglePassword()">
              <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
            </button>
          </div>
          <span class="error-msg" *ngIf="password.hasError('required') && password.touched">Password is required</span>
        </div>

        <div class="forgot-row">
          <a class="forgot-link" href="#">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary" [class.btn-loading]="isLoading" [disabled]="isLoading">
          <span *ngIf="!isLoading">Continue</span>
          <ion-spinner *ngIf="isLoading" name="crescent" class="btn-spinner"></ion-spinner>
        </button>

      </form>
    </div>

    <p class="switch-text">
      Don't have an account?
      <span class="switch-link" (click)="goToRegister()">Sign up</span>
    </p>

  </div>
</ion-content>
